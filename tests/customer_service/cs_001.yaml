id: cs_001
input: |
  שלום, ביצעתי הזמנה לפני שבוע ועדיין לא קיבלתי אותה. הזמנה 12847.
  אני די מעוצבן, אפשר לקבל החזר?
expected_actions:
  - acknowledge_emotion
  - check_order_status
  - offer_resolution_path
rubric:
